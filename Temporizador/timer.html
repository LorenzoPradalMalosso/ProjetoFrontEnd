<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="temporizadorContainer">
        
        <div id="tempo">00:00:00</div>
        <input type="number" id="minutos" placeholder="Digite os minutos" min="1">

    <div class="botoes">
        <button id="btnPlay">Iniciar</button>
        <button id="btnParar">Parar</button>
        <button id="btnResetar">Limpar</button>
    </div>
</div>
</body>
<script src="script.js"></script>
</html
